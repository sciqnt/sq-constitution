# Reusable @claude fix-mode — maintainer-triggered, inherited org-wide. A write-access
# user comments `@claude <instruction>` on an issue/PR and the agent makes the change
# (via the sciqnt-bot App token, so its push/PR triggers CI + review) and a human
# merges. Needs the CLAUDE_CODE_OAUTH_TOKEN + APP_ID + APP_PRIVATE_KEY org secrets.
#
# CALLER:
#   on:
#     issue_comment: { types: [created] }
#     pull_request_review_comment: { types: [created] }
#     issues: { types: [opened, assigned] }
#   jobs:
#     claude:
#       uses: sciqnt/sq-constitution/.github/workflows/claude.yml@v1
#       secrets: inherit
name: claude

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: { required: true }
      APP_ID: { required: true }
      APP_PRIVATE_KEY: { required: true }

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # sciqnt-bot App token so the agent's push/PR triggers CI + review.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-workflows: write

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude"
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --append-system-prompt "The sciqnt constitution governs every edit (the org sq-constitution repo: PRINCIPLES.md, PRINCIPLE_REVIEW.md). Any code you touch must keep this repo's CI green (tests + conformance) — CI verifies on the PR. Money stays Decimal, facts stay bitemporal, no credential custody, synthetic fixtures only, DCO sign-off. State honest gaps (P18). You CANNOT and MUST NOT merge anything or push to a protected branch; your only outputs are a comment, a label, a close, or a proposal PR."
